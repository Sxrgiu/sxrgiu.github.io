    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { overflow: hidden; }
        .ambient-container {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .floating-text {
            position: absolute;
            font-size: 2vw;
            color: rgba(255,255,255,0.03);
            text-transform: uppercase;
            letter-spacing: 1vw;
            white-space: nowrap;
            animation: drift 20s linear infinite;
        }
        
        .floating-text:nth-child(2) {
            top: 30%; font-size: 4vw; animation-duration: 35s; animation-direction: reverse; color: rgba(255,255,255,0.01);
        }
        .floating-text:nth-child(3) {
            top: 70%; font-size: 1.5vw; animation-duration: 15s; letter-spacing: 2vw;
        }

        .center-fade {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: pulse-glow 6s infinite alternate ease-in-out;
        }

        @keyframes drift {
            from { transform: translateX(50vw); }
            to { transform: translateX(-150vw); }
        }

        @keyframes pulse-glow {
            0% { opacity: 0.1; text-shadow: 0 0 0px var(--accent-solid); }
            100% { opacity: 0.8; text-shadow: 0 0 20px var(--accent-solid); }
        }
    </style>
</head>
