<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play - Pure Honesty</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 5rem;
            position: relative;
        }

        canvas {
            background: #111418;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .score-board {
            margin-bottom: 1rem;
            font-family: monospace;
            font-size: 1.2rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
        }

        .death-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(13, 15, 18, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 12px;
            text-align: center;
            display: none;
            backdrop-filter: blur(10px);
            z-index: 20;
            white-space: nowrap;
        }

        .death-popup h2 {
            color: #ef4444;
            font-weight: 400;
            margin-bottom: 10px;
        }

        .death-popup p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
    </style>
</head>

<body>

    <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="vibeful.html">Vibeful</a>
        <a href="moments.html">Moments</a>
        <a href="collection.html">Collection</a>
        <a href="animation.html">Animation</a>
        <a href="vanishing.html">Vanishing</a>
        <a href="play.html" class="active">Play</a>
        <a href="why.html">Why</a>
        <div class="lang-selector">
            <span onclick="doGTranslate('en')">EN</span>
            <span onclick="doGTranslate('fr')">FR</span>
            <span onclick="doGTranslate('es')">ES</span>
        </div>
    </nav>

    <main class="page-wrapper">
        <div class="header-section" style="margin-bottom: 2rem;">
            <p class="core-message" style="font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase;">Use
                Arrow Keys to Navigate</p>
        </div>

        <div class="game-container">
            <div class="score-board">SCORE: <span id="score">0</span></div>
            <canvas id="gameCanvas" width="400" height="400"></canvas>

            <div class="death-popup" id="deathPopup">
                <h2>Game Over</h2>
                <p>You hit a wall. Would you like to buy an extra life?</p>
                <div style="display:flex; gap:10px; justify-content:center;">
                    <button class="action-btn outline-btn" style="width:auto;" onclick="resetGame()">Restart
                        <a href="https://buy.stripe.com/3cI6oA6kn1gp20d5Cadby09" target="_blank">
                            <button class="action-btn solid-btn" style="width:auto;">
                                Pay $1.00
                            </button>
                        </a>
                </div>
            </div>
    </main>

    <div class="site-footer">
        <span class="footer-center">Made by Sxrgiu</span>
        <span class="footer-role">Player One</span>
    </div>

    <div id="google_translate_element" style="display:none;"></div>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'en', includedLanguages: 'en,fr,es', autoDisplay: false }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript"
        src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script src="script.js"></script>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const box = 20;
        let score = 0;
        let snake = [{ x: 9 * box, y: 10 * box }];
        let food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };
        let d;
        let gameLoop;

        document.addEventListener("keydown", direction);
        function direction(event) {
            if (event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if (event.keyCode == 38 && d != "DOWN") d = "UP";
            else if (event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if (event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        function draw() {
            ctx.fillStyle = "#111418";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i === 0) ? "#38bdf8" : rgba(56, 189, 248, 0.5);
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "#111418";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "#ef4444";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            if (snakeX == food.x && snakeY == food.y) {
                score++;
                document.getElementById('score').innerText = score;
                food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(gameLoop);
                document.getElementById('deathPopup').style.display = 'block';
                return;
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function rgba(r, g, b, a) { return `rgba(${r},${g},${b},${a})`; }

        function resetGame() {
            snake = [{ x: 9 * box, y: 10 * box }];
            score = 0;
            d = null;
            document.getElementById('score').innerText = score;
            document.getElementById('deathPopup').style.display = 'none';
            gameLoop = setInterval(draw, 100);
        }

        // Prevent scrolling on arrow keys
        window.addEventListener("keydown", function (e) {
            if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault();
            }
        }, false);

        gameLoop = setInterval(draw, 100);
    </script>
</body>

</html>
